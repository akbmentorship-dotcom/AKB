<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Align Living">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<title>Align Living</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d0d;color:#f2ede4;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;line-height:1.6;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
:root{
  --orange:#f05a1a;--orange-dim:rgba(240,90,26,0.12);--orange-border:rgba(240,90,26,0.28);
  --blue:#3a9de8;--blue-dim:rgba(58,157,232,0.12);--blue-border:rgba(58,157,232,0.28);
  --green:#3ecf82;--green-dim:rgba(62,207,130,0.12);--green-border:rgba(62,207,130,0.28);
  --purple:#9d6ef5;--purple-dim:rgba(157,110,245,0.12);--purple-border:rgba(157,110,245,0.28);
  --yellow:#f5a623;--red:#e84040;--red-dim:rgba(232,64,64,0.12);--red-border:rgba(232,64,64,0.28);
  --bg:#0d0d0d;--surface:#141414;--card:#161616;--border:#1e1e1e;--muted:#555;--light:#888;--white:#f2ede4;
}
#app{display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto}
.header{position:sticky;top:0;z-index:100;background:rgba(13,13,13,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0}
.header-inner{padding:16px 16px 0}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:2px}
.page-title{font-size:20px;font-weight:800}
.nav-bar{display:flex;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;transition:all 0.2s}
.nav-btn.active{color:var(--white);border-bottom-color:var(--orange)}
.content{flex:1;overflow-y:auto;padding:20px 16px 100px;-webkit-overflow-scrolling:touch}
.sh{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{opacity:0.75}
.subtabs{display:flex;gap:6px;margin-bottom:20px;background:var(--surface);border-radius:8px;padding:4px;border:1px solid var(--border)}
.stab{flex:1;padding:9px 12px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s}
.btn{padding:12px 20px;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:1px solid;transition:all 0.2s;display:inline-block}
.btn-sm{padding:7px 14px;font-size:11px}
.lbl{font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-top:8px}
.inp{background:#1a1a1a;border:1px solid #252525;border-radius:6px;color:var(--white);font-size:14px;padding:9px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
textarea.inp{resize:vertical}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.06em;display:inline-block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.back{background:none;border:none;color:var(--orange);font-size:13px;font-weight:600;padding:0 0 16px;letter-spacing:0.05em;display:block;cursor:pointer}
.bar{background:#1a1a1a;border-radius:3px;height:4px;overflow:hidden;margin-top:8px}
.fill{height:100%;border-radius:3px;transition:width 0.4s}
.save-btn{width:100%;padding:14px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all 0.2s;margin-top:4px}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr;gap:6px;align-items:center;margin-bottom:5px}
.set-inp{background:#1a1a1a;border:1px solid #252525;border-radius:5px;color:var(--white);font-size:15px;padding:8px 10px;width:100%;outline:none;-webkit-appearance:none}
.day-nav{display:flex;overflow-x:auto;scrollbar-width:none;margin:0 -16px;padding:0 16px;border-bottom:1px solid var(--border)}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{flex:0 0 auto;padding:12px 14px;background:none;border:none;border-bottom:2px solid transparent;color:#444;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;transition:all 0.2s;cursor:pointer}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all 0.15s}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div><div class="eyebrow">Align Living</div><div class="page-title" id="ptitle">Home</div></div>
        <button class="btn btn-sm" style="background:none;border:1px solid var(--border);color:var(--muted)" onclick="go('links')">🔗</button>
      </div>
      <div class="nav-bar" id="navbar"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
// STORAGE — uses localStorage for real persistence
const S={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error('Storage error',e)}},
};

// UTILS
const td=()=>new Date().toISOString().split('T')[0];
const wk=()=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0]};
const fmt=(s)=>{if(!s)return'—';try{return new Date(s+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})}catch{return s}};
const dSince=(s)=>{if(!s)return null;return Math.floor((Date.now()-new Date(s+'T12:00:00'))/(864e5))};
const pct=(v,t)=>Math.min(100,Math.round(v/t*100));
const sc=(p)=>p>=100?'var(--green)':p>=60?'var(--yellow)':'var(--red)';
const $=(id)=>document.getElementById(id);
const mk=(tag,attr={},ch=[])=>{
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attr)){
    if(k==='cls')e.className=v;
    else if(k==='css')e.style.cssText=v;
    else if(k.startsWith('@'))e.addEventListener(k.slice(1),v);
    else e.setAttribute(k,v);
  }
  for(const c of[].concat(ch)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
};
const div=(a,c)=>mk('div',a||{},[].concat(c||[]));
const btn=(a,c)=>mk('button',a||{},[].concat(c||[]));
const inp=(a)=>mk('input',{cls:'inp',...a});
const ta=(a,c)=>mk('textarea',{cls:'inp',...a},[].concat(c||[]));
const badge=(lbl,color)=>mk('span',{cls:'badge',css:`background:${color}22;color:${color};border:1px solid ${color}44`},[lbl]);
const sh=(lbl,color)=>div({cls:'sh',css:`color:${color||'var(--orange)'}`},[lbl]);
const card=(a,c)=>mk('div',{cls:'card',...a},[].concat(c||[]));

// DATA
const WD=[
  {id:'tue',lbl:'TUE',full:'Tuesday',title:'Upper A',sub:'Horizontal push & pull · Full gym',cv:'#f05a1a',dim:'var(--orange-dim)',brd:'var(--orange-border)',type:'Strength',
   structure:[
    {t:'compound',lbl:'Primary Compound',exs:[{id:'bench',name:'Barbell Bench Press',sets:4,reps:'4–6',note:'2 sec eccentric. Heaviest upper movement of the week.'}]},
    {t:'superset',lbl:'Superset A — Push / Pull',note:'No rest between A1+A2. 90 sec after the pair.',exs:[{id:'incline_db',name:'A1 — Incline DB Press',sets:3,reps:'10–12',note:'Push — upper chest'},{id:'cs_row',name:'A2 — Chest-Supported DB Row',sets:3,reps:'10–12',note:'Pull — full stretch at bottom'}]},
    {t:'superset',lbl:'Superset B — Vertical Push / Rear Delt',note:'No rest between B1+B2. 90 sec after the pair.',exs:[{id:'ohp',name:'B1 — DB Overhead Press',sets:3,reps:'10–12',note:'Push — strict, no leg drive'},{id:'face_pull',name:'B2 — Cable Face Pull',sets:3,reps:'15–20',note:'Pull — shoulder health, never skip'}]},
    {t:'finisher',lbl:'Finisher — Arms',note:'Alternate back to back. 60 sec rest.',exs:[{id:'curl',name:'F1 — Incline DB Curl',sets:3,reps:'12–15',note:'Bicep'},{id:'pushdown',name:'F2 — Tricep Pushdown',sets:3,reps:'12–15',note:'Tricep'}]},
  ]},
  {id:'thu',lbl:'THU',full:'Thursday',title:'Lower A',sub:'Quad & posterior chain · Full gym',cv:'#3a9de8',dim:'var(--blue-dim)',brd:'var(--blue-border)',type:'Strength',
   structure:[
    {t:'compound',lbl:'Primary Compound',exs:[{id:'squat',name:'Barbell Back Squat',sets:4,reps:'4–6',note:'Heaviest lower movement. Depth to parallel or below.'}]},
    {t:'superset',lbl:'Superset A — Hinge / Knee',note:'No rest between A1+A2. 90 sec after the pair.',exs:[{id:'rdl',name:'A1 — Romanian Deadlift',sets:3,reps:'8–10',note:'Hinge — feel the hamstring stretch'},{id:'leg_press',name:'A2 — Leg Press',sets:3,reps:'10–12',note:'Knee dominant — full range'}]},
    {t:'superset',lbl:'Superset B — Single Leg / Hamstring',note:'No rest between B1+B2. 90 sec after the pair.',exs:[{id:'lunge',name:'B1 — Walking Lunges (DB)',sets:3,reps:'10 each',note:'Single leg stability'},{id:'leg_curl',name:'B2 — Leg Curl',sets:3,reps:'10–12',note:'Hamstring isolation'}]},
    {t:'finisher',lbl:'Finisher — Calves & Core',note:'Alternate. 60 sec rest.',exs:[{id:'calf',name:'F1 — Calf Raise',sets:4,reps:'15–20',note:'Slow full range'},{id:'deadbug',name:'F2 — Dead Bug',sets:3,reps:'6 slow/side',note:'Anti-extension core'}]},
  ]},
  {id:'sat',lbl:'SAT',full:'Saturday',title:'Lower B + Plyo',sub:'Athletic development · Plyo first · Full gym',cv:'#3ecf82',dim:'var(--green-dim)',brd:'var(--green-border)',type:'Athletic',
   structure:[
    {t:'compound',lbl:'Primary Compound — Do This Fresh',note:'Plyo first. CNS needs to be fresh.',exs:[{id:'boxjump',name:'Box Jump',sets:4,reps:'4–5',note:'Max effort every rep. Reset fully between reps.'}]},
    {t:'superset',lbl:'Superset A — Posterior Chain / Power',note:'No rest between A1+A2. 90 sec after the pair.',exs:[{id:'trapbar',name:'A1 — Trap Bar Deadlift',sets:4,reps:'5–6',note:'Hinge — posterior chain'},{id:'broadjump',name:'A2 — Broad Jump',sets:3,reps:'4–5',note:'Horizontal power — land soft'}]},
    {t:'superset',lbl:'Superset B — Single Leg / Reactive',note:'No rest between B1+B2. 90 sec after the pair.',exs:[{id:'bss',name:'B1 — Bulgarian Split Squat',sets:3,reps:'8 each',note:'Single leg stability'},{id:'depthdrop',name:'B2 — Depth Drop to Jump',sets:3,reps:'4',note:'Reactive — step off, absorb, jump'}]},
    {t:'finisher',lbl:'Finisher — Hip & Core',note:'Alternate. 60 sec rest.',exs:[{id:'monster',name:'F1 — Banded Monster Walk',sets:2,reps:'15/side',note:'Hip abductor'},{id:'pallof',name:'F2 — Pallof Press',sets:3,reps:'10/side',note:'Anti-rotation core'}]},
  ]},
  {id:'sun',lbl:'SUN',full:'Sunday',title:'Upper B (Home)',sub:'Vertical push & pull · Home gym · 10×10 space',cv:'#9d6ef5',dim:'var(--purple-dim)',brd:'var(--purple-border)',type:'Hypertrophy',
   structure:[
    {t:'compound',lbl:'Primary Compound',exs:[{id:'pullup',name:'Weighted Pull-Up',sets:4,reps:'6–8',note:'Add weight at 4×8 clean. Bands to assist if needed.'}]},
    {t:'superset',lbl:'Superset A — Push / Pull',note:'No rest between A1+A2. 90 sec after the pair.',exs:[{id:'db_press',name:'A1 — DB Floor Press',sets:3,reps:'10–12',note:'Push — compact, no bench needed'},{id:'db_row',name:'A2 — Single Arm DB Row',sets:3,reps:'10–12 each',note:'Pull — brace on knee, full range'}]},
    {t:'superset',lbl:'Superset B — Push / Pull',note:'No rest between B1+B2. 90 sec after the pair.',exs:[{id:'arnold',name:'B1 — Arnold Press (DB)',sets:3,reps:'10–12',note:'Push — all 3 delt heads, rotation is athletic'},{id:'band_pull',name:'B2 — Band Pull-Apart',sets:3,reps:'20',note:'Pull — Y and W variations, rear delt health'}]},
    {t:'finisher',lbl:'Finisher — Arms',note:'Alternate. 60 sec rest. Minimal space.',exs:[{id:'hammer',name:'F1 — Hammer Curl (DB)',sets:3,reps:'12–15',note:'Bicep'},{id:'skull',name:'F2 — DB Skull Crusher',sets:3,reps:'12–15',note:'Tricep — elbows in'}]},
  ]},
];

const WU={
  tue:{color:'#f05a1a',dur:'7–8 min',phases:[
    {lbl:'Phase 1 — Raise Temperature',moves:[{name:'Arm Swing Crossovers + Reach',planes:['Sagittal','Frontal','Transverse'],dose:'30 sec',desc:'Forward/back, open wide, cross and reach.',cue:"Let the reach drive rotation through your upper back."}]},
    {lbl:'Phase 2 — Joint Mobilization',moves:[
      {name:'Thoracic Rotation (Quadruped)',planes:['Transverse','Frontal'],dose:'8 each side',desc:'Hand behind head. Rotate elbow to ground then open to ceiling.',cue:'Hips stay square. All rotation through T-spine.'},
      {name:'Wall Slide + Overhead Reach',planes:['Sagittal','Frontal'],dose:'10 reps',desc:'Forearms on wall, slide up then reach one arm overhead laterally.',cue:'Ribs down — no arch in low back.'},
      {name:'Shoulder CARs',planes:['Multi-plane'],dose:'5 each dir',desc:'Slow full-circle shoulder rotation. 3–4 seconds per revolution.',cue:'Paint the biggest circle possible. Feel every degree.'},
      {name:'Band Pull-Apart (3 positions)',planes:['Frontal','Transverse'],dose:'10 each pos',desc:'Standard, Y pull (30° above), W pull (30° below).',cue:"Squeeze shoulder blades at end range. Don't shrug."},
    ]},
    {lbl:'Phase 3 — Activation',moves:[{name:'Scapular Push-Up',planes:['Sagittal','Frontal'],dose:'10 slow',desc:'Arms straight. Chest drops between blades, then push floor away.',cue:'Scapula exercise — not chest. Control it.'}]},
  ]},
  thu:{color:'#3a9de8',dur:'7–8 min',phases:[
    {lbl:'Phase 1 — Raise Temperature',moves:[{name:'Leg Swing — 3 Directions',planes:['Sagittal','Frontal','Transverse'],dose:'10 each dir',desc:'Forward/back, side-to-side, crossbody with rotation.',cue:"Let the swing take you to end range. Don't muscle it."}]},
    {lbl:'Phase 2 — Joint Mobilization',moves:[
      {name:"World's Greatest Stretch",planes:['Multi-plane'],dose:'5 each side',desc:'Deep lunge, hand inside foot, rotate and reach ceiling, straighten back leg.',cue:'Move slowly — exploring range, not a PR.'},
      {name:'Hip 90/90 Rotations',planes:['Transverse','Frontal'],dose:'8 each side',desc:'Seated, both knees at 90°. Rotate hips side to side.',cue:"Sit tall. Go into the rotation — don't lean away."},
      {name:'Ankle CARs + Wall Dorsiflexion',planes:['Multi-plane','Sagittal'],dose:'10 + 10 reps',desc:'Slow ankle circles, then toes 4" from wall, drive knee forward.',cue:"Heel stays down. That's the whole point."},
    ]},
    {lbl:'Phase 3 — Glute Activation',moves:[{name:'Banded Clamshell + Glute Bridge',planes:['Frontal','Sagittal'],dose:'10 each move',desc:'Light band above knees. 10 clamshells each side, then 10 bridges.',cue:'On bridges — squeeze hard at top and hold 1 second.'}]},
  ]},
  sat:{color:'#3ecf82',dur:'10 min',phases:[
    {lbl:'Phase 1 — CNS Wake-Up',moves:[
      {name:'Skipping Variations (3 types)',planes:['Sagittal','Frontal','Transverse'],dose:'20m each',desc:'Forward skip, lateral shuffle, carioca. 20 metres each — not 20 minutes.',cue:'Stay light. Waking up the nervous system.'},
      {name:'Pogo Jumps',planes:['Sagittal'],dose:'3 × 10 sec',desc:'Small rapid jumps using only ankle plantarflexion. Knees nearly straight.',cue:'Ankles are springs. Minimize ground contact time.'},
    ]},
    {lbl:'Phase 2 — Hip & Ankle Mobility',moves:[
      {name:'Hip CARs (standing)',planes:['Multi-plane'],dose:'5 each dir/side',desc:'Standing on one leg, draw the largest circle with your raised knee.',cue:'Go slow. Own every degree. Range not speed.'},
      {name:'Lateral Lunge + Adductor Rock',planes:['Frontal','Transverse'],dose:'8 each side',desc:'Wide lateral lunge, rock side to side shifting weight between hips.',cue:'Non-loaded leg straight, foot flat. Chest stays tall.'},
      {name:'Ankle Circles + Dorsiflexion',planes:['Multi-plane','Sagittal'],dose:'10 + 10 reps',desc:'Slow ankle circles then elevated heel dorsiflexion rocking forward.',cue:'Knee tracks over pinky toe — not caving inward.'},
    ]},
    {lbl:'Phase 3 — Plyo Ramp-Up',moves:[{name:'Progressive Jump Sequence',planes:['Sagittal','Frontal'],dose:'1 sequence',desc:'Tuck jump ×3 → lateral bound ×4 each → one sub-max box jump.',cue:'Every landing: quiet feet, knees soft, hips back.'}]},
  ]},
  sun:{color:'#9d6ef5',dur:'6–7 min',phases:[
    {lbl:'Phase 1 — Raise Temperature',moves:[{name:'Overhead Reach + Lateral Shift',planes:['Sagittal','Frontal'],dose:'30 sec',desc:'Both arms overhead, shift ribcage side to side.',cue:'Reach long, not just up. Make yourself taller.'}]},
    {lbl:'Phase 2 — Joint Mobilization',moves:[
      {name:'Dead Hang + Shoulder Shrug',planes:['Sagittal','Frontal'],dose:'8 cycles',desc:'Hang from bar, alternate passive hang with active scapular pack (2 sec hold).',cue:"Packed position is where your pull-up starts. Own it here."},
      {name:'Thoracic Extension + Rotation',planes:['Sagittal','Transverse'],dose:'8 ext + 4 rot',desc:'Edge of bench at mid-back. Extend back, then add rotation.',cue:'Let gravity do the extension. Add rotation after settling.'},
      {name:'Diagonal Band Pull-Down',planes:['Transverse','Frontal'],dose:'10 each side',desc:'Band anchored overhead. Pull diagonally across to opposite hip.',cue:'Drive your elbow to your hip pocket — not straight down.'},
    ]},
    {lbl:'Phase 3 — Activation',moves:[{name:'Band Pull-Apart — Y + W',planes:['Frontal','Transverse'],dose:'12 each pos',desc:'Standard, then overhead Y, then W at chest height.',cue:'On Y — lead with pinkies and think armpit forward.'}]},
  ]},
};

const PC={'Sagittal':'#f05a1a','Frontal':'#3a9de8','Transverse':'#3ecf82','Multi-plane':'#9d6ef5'};
const BC_t={compound:'#f05a1a',superset:'#3a9de8',finisher:'#9d6ef5'};
const STAGES=['Prospect','Evaluating','Active Partner','Paused','Closed'];
const SCOL={'Prospect':'#555','Evaluating':'#f5a623','Active Partner':'#3ecf82','Paused':'#f05a1a','Closed':'#e84040'};

const CNAV=[
  {id:'dashboard',lbl:'⚡ Home'},
  {id:'growth',lbl:'🌱 Growth'},
  {id:'workout',lbl:'💪 Workout'},
  {id:'pipeline',lbl:'🔥 Pipeline'},
  {id:'clients',lbl:'🤝 Clients'},
  {id:'partners',lbl:'⚡ Partners'},
  {id:'content',lbl:'🎬 Content'},
];
const TITLES={dashboard:'Align Living',growth:'Growth Log',workout:'Workout',pipeline:'Pipeline',clients:'Client CRM',partners:'AKB Partners',content:'Content',links:'Apps'};

let curView='dashboard';
function go(id){
  curView=id;
  $('ptitle').textContent=TITLES[id]||id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===id));
  render(id);
}

function render(id){
  const c=$('content');
  c.innerHTML='';c.scrollTop=0;
  ({dashboard:rDash,growth:rGrowth,workout:rWorkout,pipeline:rPipeline,clients:rClients,partners:rPartners,content:rContent,links:rLinks}[id]||noop)();
}
const noop=()=>{};

// ── INIT
function init(){
  const nb=$('navbar');
  CNAV.forEach(n=>{
    nb.appendChild(btn({cls:'nav-btn','data-v':n.id,'@click':()=>go(n.id)},[n.lbl]));
  });
  go('dashboard');
}

// ══ DASHBOARD
function rDash(){
  const c=$('content'),t=td(),w=wk();
  const streaks=S.get('streaks')||{};
  const wPip=(S.get(`week:${w}`)||{}).totals||{};
  const clients=S.get('clients')||[];

  c.appendChild(div({css:'margin-bottom:24px'},[
    div({css:'font-size:11px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px'},[t]),
    div({css:'font-size:26px;font-weight:800'},['Good morning, Austin.']),
  ]));

  c.appendChild(sh("Today's Growth",'var(--purple)'));
  const sg=div({cls:'g3',css:'margin-bottom:20px'},[]);
  [{id:'bible',lbl:'Bible',icon:'📖',cv:'#9d6ef5'},{id:'book',lbl:'Book',icon:'📚',cv:'#3a9de8'},{id:'podcast',lbl:'Podcast',icon:'🎧',cv:'#3ecf82'}].forEach(s=>{
    const done=streaks[s.id]?.lastDate===t;
    const streak=streaks[s.id]?.streak||0;
    sg.appendChild(div({cls:'card tap',css:`border-color:${done?s.cv+'44':'var(--border)'};background:${done?s.cv+'1a':'var(--card)'};text-align:center`,'@click':()=>go('growth')},[
      div({css:'font-size:22px;margin-bottom:4px'},[s.icon]),
      div({css:`font-size:22px;font-weight:800;line-height:1;color:${done?s.cv:'var(--muted)'}`},[streak]),
      div({css:`font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;color:${done?s.cv:'var(--muted)'}`},[done?'✓ Done':'Not yet']),
      div({css:'font-size:10px;color:var(--muted);margin-top:2px'},[s.lbl]),
    ]));
  });
  c.appendChild(sg);

  c.appendChild(sh('This Week — Pipeline','var(--orange)'));

function rTrack(c,day){
  const t=td();
  const hist=S.get(`history:${day.id}`)||[];
  const last=[...hist].reverse().find(h=>h.date!==t);

  if(last)c.appendChild(div({css:'background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--muted)'},[
    mk('span',{css:`color:${day.cv};font-weight:600`},['Last session: ']),last.date,' — gray placeholders are your previous numbers'
  ]));

  day.structure.forEach(blk=>{
    const bc=BC_t[blk.t]||'#888';
    c.appendChild(div({css:`font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:${bc};margin-bottom:8px;display:flex;align-items:center;gap:10px`},[
      blk.lbl,div({css:'flex:1;height:1px;background:#1e1e1e'},[])
    ]));
    if(blk.note)c.appendChild(div({css:'font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px'},[blk.note]));

    const bc2=div({css:`background:var(--card);border:1px solid ${bc}44;border-radius:8px;overflow:hidden;margin-bottom:16px`},[]);
    blk.exs.forEach((ex,ei)=>{
      const exDiv=div({css:`border-bottom:${ei===blk.exs.length-1?'none':'1px solid #222'}`},[]);
      const lastEx=last?.logs?.[ex.id];

      const exH=div({css:'padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start'},[
        div({},[
          div({css:'font-weight:600;font-size:14px'},[ex.name]),
          div({css:'font-size:11px;color:var(--muted)'},[ex.sets+' sets × '+ex.reps+(ex.note?' · '+ex.note:'')]),
        ]),
      ]);
      if(lastEx?.sets){
        const ld=div({css:'font-size:10px;color:#333;text-align:right;line-height:1.8'},[]);
        lastEx.sets.filter(s=>s.w||s.r).forEach(s=>ld.appendChild(div({},[( s.w||'—')+' × '+(s.r||'—')])));
        exH.appendChild(ld);
      }
      exDiv.appendChild(exH);

      const sd=div({css:'padding:0 16px 12px'},[]);
      const hdr=div({css:'display:grid;grid-template-columns:24px 1fr 1fr;gap:6px;margin-bottom:4px;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#333'},[
        div({},'#'),div({},'Weight (lb)'),div({},'Reps')
      ]);
      sd.appendChild(hdr);

      for(let i=0;i<ex.sets;i++){
        const cur=(()=>{const lg=S.get(`log:${day.id}:${t}`)||{};return(lg[ex.id]?.sets||[])[i]||{w:'',r:''}})();
        const lset=lastEx?.sets?.[i];
        const row=div({cls:'set-row'},[div({css:`font-size:12px;font-weight:700;color:${bc};text-align:center`},[i+1])]);
        const wi=mk('input',{type:'number',inputmode:'decimal',placeholder:lset?.w||'0',value:cur.w||'',cls:'set-inp',
          '@change':(e)=>{
            const lg=S.get(`log:${day.id}:${t}`)||{};
            const ex2=lg[ex.id]||{};const sets=[...(ex2.sets||[])];
            while(sets.length<=i)sets.push({w:'',r:''});
            sets[i]={...sets[i],w:e.target.value};
            lg[ex.id]={...ex2,sets};S.set(`log:${day.id}:${t}`,lg);
          }
        });
        const ri=mk('input',{type:'number',inputmode:'decimal',placeholder:lset?.r||'0',value:cur.r||'',cls:'set-inp',
          '@change':(e)=>{
            const lg=S.get(`log:${day.id}:${t}`)||{};
            const ex2=lg[ex.id]||{};const sets=[...(ex2.sets||[])];
            while(sets.length<=i)sets.push({w:'',r:''});
            sets[i]={...sets[i],r:e.target.value};
            lg[ex.id]={...ex2,sets};S.set(`log:${day.id}:${t}`,lg);
          }
        });
        row.appendChild(wi);row.appendChild(ri);
        sd.appendChild(row);
      }
      exDiv.appendChild(sd);
      bc2.appendChild(exDiv);
    });
    c.appendChild(bc2);
  });

  const sb=btn({cls:'save-btn',css:`background:${day.dim};border-color:${day.brd};color:${day.cv}`,'@click':()=>{
    const lg=S.get(`log:${day.id}:${t}`)||{};
    const h2=S.get(`history:${day.id}`)||[];
    S.set(`history:${day.id}`,[...h2.filter(x=>x.date!==t),{date:t,logs:lg}].slice(-20));
    sb.textContent='✓ Session Saved';sb.style.background='rgba(62,207,130,0.15)';sb.style.borderColor='rgba(62,207,130,0.4)';sb.style.color='var(--green)';
    setTimeout(()=>{sb.textContent='Save Session';sb.style.background=day.dim;sb.style.borderColor=day.brd;sb.style.color=day.cv;},2000);
  }},['Save Session']);
  c.appendChild(sb);
}

function rWHistory(c,day){
  const hist=S.get(`history:${day.id}`)||[];
  const allEx=day.structure.flatMap(b=>b.exs);
  if(!hist.length){c.appendChild(div({css:'text-align:center;color:var(--muted);padding:40px;font-size:14px'},['No sessions logged yet.']));return;}
  [...hist].reverse().forEach(sess=>{
    const hc=card({css:'overflow:hidden'},[
      div({css:'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)'},[
        mk('span',{css:'font-weight:600;font-size:14px'},[sess.date]),
        mk('span',{css:`font-size:11px;color:${day.cv}`},[Object.keys(sess.logs||{}).length+' exercises']),
      ]),
    ]);
    allEx.forEach(ex=>{
      const el2=sess.logs?.[ex.id];
      if(!el2?.sets?.some(s=>s.w||s.r))return;
      const ed=div({css:'margin-bottom:10px'},[div({css:'font-size:12px;font-weight:600;color:var(--light);margin-bottom:4px'},[ex.name])]);
      const pl=div({css:'display:flex;flex-wrap:wrap;gap:5px'},[]);
      el2.sets.forEach(s=>pl.appendChild(div({css:'background:#1a1a1a;border:1px solid #252525;border-radius:4px;padding:3px 8px;font-size:12px;color:#666'},[(s.w?s.w+'lb':'—')+' × '+(s.r||'—')])));
      ed.appendChild(pl);hc.appendChild(ed);
    });
    c.appendChild(hc);
  });
}

// ══ CLIENTS
function rClients(){
  const c=$('content');
  const clients=S.get('clients')||[];
  const t=td();
  const tr=div({css:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'},[
    div({cls:'sh',css:'color:var(--blue);margin-bottom:0;flex:1'},['Clients ('+clients.length+')',div({css:'flex:1;height:1px;background:var(--border);margin-left:10px'},[])]),
    btn({cls:'btn btn-sm',css:'background:var(--blue-dim);border-color:var(--blue-border);color:var(--blue)','@click':()=>showCForm(null)},['+ Add']),
  ]);
  c.appendChild(tr);
  if(!clients.length){c.appendChild(div({css:'text-align:center;color:var(--muted);padding:40px;font-size:14px'},['No clients yet.']));return;}
  const sorted=[...clients].sort((a,b)=>{
    const aO=a.followUpDate&&a.followUpDate<t,bO=b.followUpDate&&b.followUpDate<t;
    if(aO&&!bO)return-1;if(!aO&&bO)return 1;
    return(a.followUpDate||'z').localeCompare(b.followUpDate||'z');
  });
  sorted.forEach(cl=>{
    const ov=cl.followUpDate&&cl.followUpDate<t,du=cl.followUpDate&&cl.followUpDate===t;
    const cc=card({cls:'card tap',css:`border-color:${ov?'var(--red-border)':du?'var(--blue-border)':'var(--border)'}`,'@click':()=>showCForm(cl)},[]);
    const row=div({css:'display:flex;justify-content:space-between;align-items:flex-start'},[
      div({},[
        div({css:'font-weight:600;font-size:15px;margin-bottom:4px'},[cl.name]),
        cl.phone?div({css:'font-size:12px;color:var(--muted)'},[cl.phone]):null,
        cl.reachOutDate?div({css:'font-size:12px;color:var(--muted)'},['Reached out: '+fmt(cl.reachOutDate)]):null,
        cl.samples?div({css:'font-size:12px;color:var(--light);margin-top:4px'},['Samples: '+cl.samples]):null,
      ].filter(Boolean)),
      div({css:'flex-shrink:0;margin-left:12px'},[
        ov?badge('Overdue','#e84040'):du?badge('Due Today','#3a9de8'):cl.followUpDate?div({css:'font-size:11px;color:var(--muted)'},['Follow-up\n'+fmt(cl.followUpDate)]):null,
      ].filter(Boolean)),
    ]);
    cc.appendChild(row);
    c.appendChild(cc);
  });
}

function showCForm(cl){
  const c=$('content');c.innerHTML='';

  c.appendChild(sh(cl?'Edit Client':'New Client','var(--blue)'));

  const fc=card({},[]);
  const fields=[{lbl:'Name',k:'name',ph:'Full name'},{lbl:'Phone',k:'phone',ph:'Phone number'},{lbl:'Email',k:'email',ph:'Email address'},{lbl:'Reach Out Date',k:'reachOutDate',type:'date'},{lbl:'Samples Given',k:'samples',ph:'e.g. Protein shake — Sept 2025',multi:true},{lbl:'Follow-Up Date',k:'followUpDate',type:'date'},{lbl:'Notes',k:'notes',ph:'Context, observations...',multi:true}];
